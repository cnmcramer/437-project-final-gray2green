<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get a Quote - Gray to Green</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <h1>Gray to Green</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/services">Services</a>
      <a href="/gallery">Gallery</a>
      <a href="/quote">Quote</a>
      <a href="/contact">Contact</a>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h2>Request a Free Quote</h2>
      <p>Tell us about your project and we’ll get back to you.</p>
    </section>

    <section class="form-section">
      <form id="quoteForm" enctype="multipart/form-data">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" required>

        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="address">Address</label>
        <input type="text" id="address" name="address" required>

        <label for="serviceId">Service Needed</label>
        <select id="serviceId" name="serviceId" required>
          <option value="">Select a service</option>
          <option value="mulch-installation">Mulch Installation</option>
          <option value="lawn-care">Lawn Care & Maintenance</option>
          <option value="landscape-design">Landscape Design</option>
          <option value="hardscaping">Hardscaping</option>
          <option value="tree-shrub-trimming">Tree & Shrub Trimming</option>
          <option value="cleanups">Fall & Spring Clean-Ups</option>
          <option value="rock-stone-installation">Rock & Stone Installation</option>
          <option value="sod-installation">Sod Installation</option>
        </select>

        <label for="lawnSize">Lawn Size</label>
        <select id="lawnSize" name="lawnSize">
          <option value="">Select size</option>
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>

        <label for="description">Project Description</label>
        <textarea id="description" name="description" rows="5" required></textarea>

        <label for="preferredDate">Preferred Date</label>
        <input type="date" id="preferredDate" name="preferredDate">

        <label for="images">Upload Images</label>
        <input type="file" id="images" name="images" multiple>

        <button type="submit">Submit Quote Request</button>
      </form>

      <div id="formMessage" class="message"></div>
    </section>
  </main>

  <script src="/static/js/main.js"></script>
</body>
</html>
